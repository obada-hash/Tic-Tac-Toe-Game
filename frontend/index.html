<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css" />
 
  <!-- SockJS + STOMP for WebSocket communication -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
 
  <!-- ── LOBBY ── -->
  <div id="screen-lobby" class="screen active">
    <h1>Tic-Tac-Toe</h1>
 
    <div class="card">
      <h2>Create Game</h2>
      <!-- ASSUMPTION: GameBoardCreateRequestDto has a "playerName" field.
           Adjust the field name in script.js → createGame() if different. -->
      <input id="input-name-create" type="text" placeholder="Your name" maxlength="20" />
      <button id="btn-create">Create</button>
    </div>
 
    <div class="divider">— or —</div>
 
    <div class="card">
      <h2>Join Game</h2>
      <input id="input-game-id" type="text" placeholder="Game ID (UUID)" />
      <input id="input-name-join" type="text" placeholder="Your name" maxlength="20" />
      <button id="btn-join">Join</button>
    </div>
 
    <p id="lobby-error" class="error hidden"></p>
  </div>
 
  <!-- ── WAITING ── -->
  <div id="screen-waiting" class="screen">
    <h1>Tic-Tac-Toe</h1>
    <div class="card">
      <p>Share this Game ID with your friend:</p>
      <strong id="display-game-id" class="game-id-text"></strong>
      <button id="btn-copy">Copy ID</button>
      <p class="muted">Waiting for opponent to join…</p>
    </div>
  </div>
 
  <!-- ── GAME ── -->
  <div id="screen-game" class="screen">
    <h1>Tic-Tac-Toe</h1>
 
    <p id="status-text" class="status">Connecting…</p>
 
    <div id="board" class="board">
      <!-- 9 cells, index 0–8 -->
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>
 
    <p id="game-error" class="error hidden"></p>
    <button id="btn-new-game">Back to Lobby</button>
  </div>
 
  <script src="script.js"></script>
</body>
</html>
